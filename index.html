<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dürer's Perspective Machine | 3D Visualization</title>
    <meta name="description" content="A 3D demonstration of Albrecht Dürer's perspective drawing machine built with Babylon.js.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <!-- Babylon.js CDN -->
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
</head>
<body>
    <div class="ui-container">
        <div class="ui-overlay">
            <div class="badge">Phase 6: Geometric Polish</div>
            <h1>Dürer's Machine</h1>
            <p>Albrecht Dürer's perspective apparatus<br>demonstration in WebGL.</p>
        </div>
        
        <div class="button-container">
            <button id="resetBtn" class="btn-reset">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                Reset Scene
            </button>
        </div>
    </div>
    
    <canvas id="renderCanvas"></canvas>

    <script src="main.js"></script>
</body>
</html>
